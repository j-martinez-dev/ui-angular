@if (!hidden()) {
  <label class="toggle-wrapper" [class.toggle--disabled]="disabled()">
    <input
      type="checkbox"
      class="sr-only"
      [checked]="checked()"
      [disabled]="disabled()"
      [attr.aria-invalid]="(invalid() && touched()) || null"
      [attr.aria-required]="required() || null"
      (change)="onCheckedChange($event)"
      (focus)="touched.set(false)"
      (blur)="touched.set(true)"
    />
    <span
      class="toggle-track"
      [class.toggle-track--checked]="checked()"
      [class.toggle-track--invalid]="invalid() && touched()"
    >
      <span class="toggle-thumb"></span>
    </span>
    @if (label()) {
      <span class="toggle-label">{{ label() }}</span>
    }
  </label>
}
