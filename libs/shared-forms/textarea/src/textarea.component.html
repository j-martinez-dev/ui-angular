@if (!hidden()) {
  <div
    class="textarea-wrapper"
    [class.textarea-wrapper--focused]="isFocused()"
    [class.textarea-wrapper--disabled]="disabled()"
    [class.textarea-wrapper--readonly]="readonly()"
    [class.textarea-wrapper--invalid]="invalid() && touched()"
  >
    <textarea
      class="textarea-field"
      [value]="value()"
      [rows]="rows()"
      [placeholder]="placeholder() ?? ''"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [attr.id]="id() || null"
      [attr.required]="required() || null"
      [attr.minlength]="minLength() ?? null"
      [attr.maxlength]="maxLength() ?? null"
      [attr.aria-invalid]="(invalid() && touched()) || null"
      [attr.aria-required]="required() || null"
      [attr.aria-describedby]="effectiveDescribedBy()"
      [class.textarea-field--auto-resize]="autoResize()"
      (input)="onInput($event)"
      (focus)="isFocused.set(true); touched.set(false)"
      (blur)="onBlur()"
    ></textarea>
  </div>
  @if (showCount()) {
    <span class="textarea-count" [id]="countId">{{ charCount() }}</span>
  }
}
