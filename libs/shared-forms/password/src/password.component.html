@if (!hidden()) {
  <div class="password-container">
    <div
      class="password-wrapper"
      [class.password-wrapper--focused]="isFocused()"
      [class.password-wrapper--disabled]="disabled()"
      [class.password-wrapper--readonly]="readonly()"
      [class.password-wrapper--invalid]="invalid() && touched()"
    >
      <input
        class="password-field"
        [type]="isVisible() ? 'text' : 'password'"
        [value]="value()"
        [placeholder]="placeholder()"
        [disabled]="disabled()"
        [readonly]="readonly()"
        [attr.required]="required() || null"
        [attr.minlength]="minLength() ?? null"
        [attr.maxlength]="maxLength() ?? null"
        [attr.aria-invalid]="(invalid() && touched()) || null"
        [attr.aria-required]="required() || null"
        (input)="onInput($event)"
        (focus)="isFocused.set(true)"
        (blur)="onBlur()"
      />
      <ui-icon-button
        [icon]="isVisible() ? 'heroEyeSlash' : 'heroEye'"
        [label]="isVisible() ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
        variant="ghost"
        size="sm"
        [disabled]="disabled()"
        (click)="toggleVisibility()"
      />
    </div>

    @if (showStrength() && value()) {
      <div class="password-strength">
        <div class="password-strength-bar">
          <div
            class="password-strength-fill"
            [class]="'password-strength-fill--' + strength()"
          ></div>
        </div>
        <span class="password-strength-label" [class]="'password-strength-label--' + strength()">
          {{ strengthLabel() }}
        </span>
      </div>
    }
  </div>
}
