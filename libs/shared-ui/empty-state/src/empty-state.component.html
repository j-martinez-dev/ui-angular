<div class="empty-state">
  @if (icon()) {
    <ui-icon
      [name]="icon()!"
      [size]="iconSize()"
      color="muted"
      class="empty-state-icon"
    />
  }

  <div class="empty-state-content">
    <h3 class="empty-state-title">{{ title() }}</h3>
    @if (description()) {
      <p class="empty-state-description">{{ description() }}</p>
    }
  </div>

  @if (actionLabel()) {
    <ui-button
      [variant]="actionVariant()"
      [iconLeft]="actionIcon()"
      size="md"
      (click)="actionClick.emit()"
    >
      {{ actionLabel() }}
    </ui-button>
  }
</div>
