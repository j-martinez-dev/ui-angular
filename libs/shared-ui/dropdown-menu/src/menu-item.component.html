<button
  #btnRef
  class="menu-item"
  [class.menu-item--danger]="variant() === 'danger'"
  [class.menu-item--disabled]="disabled()"
  [disabled]="disabled()"
  role="menuitem"
  (click)="onItemClick()"
>
  @if (icon()) {
    <ui-icon [name]="icon()!" size="sm" />
  }
  <span class="menu-item-label">
    <ng-content />
  </span>
</button>
